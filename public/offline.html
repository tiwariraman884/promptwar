<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1D9E75" />
    <title>GreenStep Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6fbf8;
        color: #18342e;
        font-family: "DM Sans", Inter, system-ui, sans-serif;
      }

      main {
        width: min(90vw, 420px);
        border: 1px solid #d9e8e2;
        border-radius: 12px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 16px 40px rgba(8, 80, 65, 0.08);
      }

      .icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: #e1f5ee;
        color: #085041;
      }

      .icon img {
        width: 34px;
        height: 34px;
      }

      h1 {
        margin: 20px 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: rgba(24, 52, 46, 0.72);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">
        <img src="/icons/leaf-logo.svg" alt="" />
      </div>
      <h1>You are offline</h1>
      <p>
        Calculator and tips pages are cached after your first visit. Reconnect
        to refresh dashboard, leaderboard, and account data.
      </p>
    </main>
  </body>
</html>
